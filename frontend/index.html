<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        .chat-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .chat-header h1 { font-size: 18px; font-weight: 600; }
        .chat-header p  { font-size: 13px; opacity: 0.8; margin-top: 2px; }

        .new-chat-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        .new-chat-btn:hover { background: rgba(255,255,255,0.35); }

        /* ── Messages area ── */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .welcome {
            text-align: center;
            margin: auto;
            color: #888;
        }
        .welcome .icon { font-size: 52px; margin-bottom: 12px; }
        .welcome h2   { font-size: 20px; color: #333; margin-bottom: 6px; }
        .welcome p    { font-size: 14px; }

        /* Suggestion chips */
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }
        .chip {
            background: #f0f2f5;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chip:hover { background: #e8eaf6; border-color: #667eea; color: #667eea; }

        /* ── Message bubbles ── */
        .message {
            display: flex;
            gap: 10px;
            max-width: 78%;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.ai   { align-self: flex-start; }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .message.user .avatar { background: #667eea; }
        .message.ai   .avatar { background: #f0f2f5; }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.7;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .message.user .bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.ai .bubble {
            background: #f0f2f5;
            color: #222;
            border-bottom-left-radius: 4px;
        }
        .bubble.error {
            background: #fff5f5;
            color: #c53030;
            border: 1px solid #feb2b2;
        }

        /* ── Typing indicator ── */
        .typing {
            display: flex;
            gap: 5px;
            padding: 14px 16px;
            background: #f0f2f5;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }
        .typing span {
            width: 8px;
            height: 8px;
            background: #aaa;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30%            { transform: translateY(-6px); }
        }

        /* ── Input area ── */
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid #f0f2f5;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        #user-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 24px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            resize: none;
            max-height: 120px;
            transition: border-color 0.2s;
        }
        #user-input:focus { border-color: #667eea; }
        #user-input:disabled { background: #fafafa; }

        #send-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.1s;
        }
        #send-btn:hover  { opacity: 0.88; }
        #send-btn:active { transform: scale(0.93); }
        #send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="chat-container">

    <div class="chat-header">
        <div>
            <h1>AI Career Assistant</h1>
            <p>Powered by RAG + GPT-4o-mini</p>
        </div>
        <button class="new-chat-btn" onclick="newChat()">New Chat</button>
    </div>

    <div class="chat-messages" id="chat-messages">
        <div class="welcome" id="welcome">
            <div class="icon">🤖</div>
            <h2>AI Career Assistant</h2>
            <p>Ask me about job matches, market trends, or your resume</p>
            <div class="suggestions">
                <div class="chip" onclick="useChip(this)">What jobs match my resume?</div>
                <div class="chip" onclick="useChip(this)">What are the most in-demand skills?</div>
                <div class="chip" onclick="useChip(this)">How many jobs are available?</div>
                <div class="chip" onclick="useChip(this)">What companies are hiring the most?</div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <textarea id="user-input" placeholder="Ask about jobs, skills, or your resume..." rows="1"></textarea>
        <button id="send-btn" onclick="sendMessage()">&#9658;</button>
    </div>

</div>

<script>
    const API = "http://localhost:8000";
    let sessionId = null;
    let busy = false;

    const messagesEl = document.getElementById("chat-messages");
    const inputEl    = document.getElementById("user-input");
    const sendEl     = document.getElementById("send-btn");

    // Auto-resize textarea as user types
    inputEl.addEventListener("input", () => {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
    });

    // Send on Enter, new line on Shift+Enter
    inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // Click a suggestion chip → fill input and send
    function useChip(el) {
        inputEl.value = el.textContent;
        sendMessage();
    }

    async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text || busy) return;

        removeWelcome();
        addBubble("user", text);
        inputEl.value = "";
        inputEl.style.height = "auto";

        const loadingEl = addLoading();
        setBusy(true);

        try {
            const res = await fetch(`${API}/chat`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text, session_id: sessionId }),
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.detail || `HTTP ${res.status}`);
            }

            const data = await res.json();
            sessionId = data.session_id;
            loadingEl.remove();
            addBubble("ai", data.response);

        } catch (err) {
            loadingEl.remove();
            addBubble("ai", `Connection error: ${err.message}\n\nMake sure the server is running:\nconda activate rag_env\nuvicorn main:app --reload`, true);
        } finally {
            setBusy(false);
        }
    }

    function addBubble(role, text, isError = false) {
        const row    = document.createElement("div");
        row.className = `message ${role}`;

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = role === "user" ? "👤" : "🤖";

        const bubble = document.createElement("div");
        bubble.className = `bubble${isError ? " error" : ""}`;
        bubble.textContent = text;

        row.appendChild(avatar);
        row.appendChild(bubble);
        messagesEl.appendChild(row);
        scrollDown();
        return row;
    }

    function addLoading() {
        const row    = document.createElement("div");
        row.className = "message ai";

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = "🤖";

        const dots = document.createElement("div");
        dots.className = "typing";
        dots.innerHTML = "<span></span><span></span><span></span>";

        row.appendChild(avatar);
        row.appendChild(dots);
        messagesEl.appendChild(row);
        scrollDown();
        return row;
    }

    function setBusy(state) {
        busy = state;
        sendEl.disabled  = state;
        inputEl.disabled = state;
        if (!state) inputEl.focus();
    }

    function scrollDown() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeWelcome() {
        const w = document.getElementById("welcome");
        if (w) w.remove();
    }

    async function newChat() {
        if (sessionId) {
            fetch(`${API}/chat/${sessionId}`, { method: "DELETE" }).catch(() => {});
            sessionId = null;
        }
        messagesEl.innerHTML = `
            <div class="welcome" id="welcome">
                <div class="icon">🤖</div>
                <h2>AI Career Assistant</h2>
                <p>Ask me about job matches, market trends, or your resume</p>
                <div class="suggestions">
                    <div class="chip" onclick="useChip(this)">What jobs match my resume?</div>
                    <div class="chip" onclick="useChip(this)">What are the most in-demand skills?</div>
                    <div class="chip" onclick="useChip(this)">How many jobs are available?</div>
                    <div class="chip" onclick="useChip(this)">What companies are hiring the most?</div>
                </div>
            </div>`;
        inputEl.focus();
    }
</script>
</body>
</html>
